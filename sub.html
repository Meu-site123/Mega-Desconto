<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscrição - Crie a Sua Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="elementos.css">
</head>
<body class="min-h-screen flex flex-col">

    <!-- Cabeçalho Simples -->
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <a href="#" class="text-2xl font-bold text-gray-900">
                <span style="color: var(--color-primary);">Mega Descontos</span> | Subscrição
            </a>
        </div>
    </header>

    <!-- Área Principal: Cartão de Subscrição Centrado -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-lg">
            <div class="bg-white p-8 sm:p-10 rounded-xl shadow-2xl border border-gray-100 register-card-animation">
                
                <!-- Título -->
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Crie a Sua Conta</h1>
                    <p class="text-gray-500">Registe-se em segundos para aceder aos nossos serviços.</p>
                </div>
                
                <!-- Mensagem de Feedback -->
                <div id="feedback-message" class="p-4 rounded-lg mb-6 hidden show" role="alert">
                    <p id="feedback-text" class="font-medium"></p>
                </div>

                <!-- Formulário de Subscrição -->
                <form id="register-form" onsubmit="handleRegistration(event)" class="space-y-6">
                    <!-- Nome Completo -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                        <input type="text" id="name" required class="register-input" placeholder="O seu nome completo">
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" required class="register-input" placeholder="o.seu.email@exemplo.com">
                    </div>

                    <!-- Palavra-Passe -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Palavra-Passe</label>
                        <input type="password" id="password" required class="register-input" placeholder="Mínimo 8 caracteres" minlength="8">
                    </div>

                    <!-- Confirmar Palavra-Passe -->
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Palavra-Passe</label>
                        <input type="password" id="confirm-password" required class="register-input" placeholder="Repita a palavra-passe" minlength="8">
                    </div>
                    
                    <!-- Termos e Condições (Checkbox) -->
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="terms" type="checkbox" required class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300 rounded">
                        </div>
                        <div class="ml-3 text-sm">
                            <label for="terms" class="font-medium text-gray-700">Concordo com os 
                                <a href="#" class="text-blue-600 hover:text-blue-800">Termos e Condições</a>
                            </label>
                        </div>
                    </div>

                    <!-- Botão de Enviar -->
                    <div>
                        <button type="submit" onclick="sub();" id="register-button" class="submit-button w-full text-white font-semibold py-3 rounded-lg shadow-lg uppercase tracking-wider">
                            
                            <a href="index.html">
                                Subscrever
                          </a>


                         </button> 
                        <br>
                        <br>
                            
                         <button type="submit" class="submit-button w-full text-white font-semibold py-3 rounded-lg shadow-lg uppercase tracking-wider">  
                              <a href="index.html">
                                Ir para a Página Inicial
                          </a>
                        </button>
                        
                   
                    </div>
                </form>

                <!-- Links de Rodapé -->
                <div class="mt-8 text-center text-sm text-gray-600">
                    Já tem uma conta? 
                    <a href="logar.html" class="font-medium text-blue-600 hover:text-blue-800 transition duration-150">Iniciar Sessão</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="bg-gray-800 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 text-center text-sm">
            &copy; 2025 Mwga desconto. Registo seguro. | Todos os direitos reservados. |Temu portugal-com
        </div>
    </footer>

    <!-- JavaScript para Lógica de Subscrição (Mock) -->
    <script>
        // --- Variáveis Globais Firestore (Obrigatórias) ---
        // Estas variáveis são essenciais no ambiente Canvas, mesmo que a autenticação
        // real esteja mockada.
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // Simulação de objetos Firebase para evitar erros de referência
        const db = { collection: () => ({ doc: () => ({}) }) };
        const auth = { currentUser: { uid: 'mockUserId' } };
        // Fim das variáveis Firestore

        const form = document.getElementById('register-form');
        const feedbackDiv = document.getElementById('feedback-message');
        const feedbackText = document.getElementById('feedback-text');
        const registerButton = document.getElementById('register-button');

        /**
         * Exibe uma mensagem de feedback ao utilizador.
         * @param {string} message - O texto da mensagem.
         * @param {boolean} isSuccess - Verdadeiro para sucesso, Falso para erro.
         */
        function showFeedback(message, isSuccess) {
            // Limpa classes anteriores
            feedbackDiv.className = 'p-4 rounded-lg mb-6 show';
            feedbackDiv.classList.remove('hidden');

            if (isSuccess) {
                feedbackDiv.classList.add('bg-green-100', 'text-green-700');
                feedbackText.textContent = `✅ ${message}`;
            } else {
                feedbackDiv.classList.add('bg-red-100', 'text-red-700');
                feedbackText.textContent = `❌ ${message}`;
            }

            // Esconder a mensagem após 5 segundos
            setTimeout(() => {
                feedbackDiv.classList.add('hidden');
                feedbackDiv.classList.remove('show');
            }, 5000);
        }

        /**
         * Lida com o envio do formulário de Subscrição.
         */
        function handleRegistration(event) {
            event.preventDefault(); // Impede o envio real do formulário
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const termsAccepted = document.getElementById('terms').checked;
            
            // Desativa o botão e mostra estado de carregamento
            registerButton.disabled = true;
            registerButton.textContent = "A registar...";
            registerButton.classList.add('opacity-70');

            // 1. Validação de campos
            if (!name || !email || !password || !confirmPassword) {
                // Simulação de delay para feedback
                setTimeout(() => {
                    registerButton.disabled = false;
                    registerButton.textContent = "Subscrever";
                    registerButton.classList.remove('opacity-70');
                    showFeedback("Por favor, preencha todos os campos obrigatórios.", false);
                }, 500);
                return;
            }

            // 2. Validação da Palavra-Passe
            if (password.length < 8) {
                setTimeout(() => {
                    registerButton.disabled = false;
                    registerButton.textContent = "Subscrever";
                    registerButton.classList.remove('opacity-70');
                    showFeedback("A palavra-passe deve ter no mínimo 8 caracteres.", false);
                }, 500);
                return;
            }

            // 3. Validação de Confirmação da Palavra-Passe
            if (password !== confirmPassword) {
                setTimeout(() => {
                    registerButton.disabled = false;
                    registerButton.textContent = "Subscrever";
                    registerButton.classList.remove('opacity-70');
                    showFeedback("As palavras-passe não coincidem.", false);
                }, 500);
                return;
            }
            
            // 4. Validação dos Termos (já tratado pelo 'required' mas reforçado)
            if (!termsAccepted) {
                setTimeout(() => {
                    registerButton.disabled = false;
                    registerButton.textContent = "Subscrever";
                    registerButton.classList.remove('opacity-70');
                    showFeedback("Tem de aceitar os Termos e Condições para continuar.", false);
                }, 500);
                return;
            }

            // 5. Simulação de delay de rede para o registo
            setTimeout(() => {
                registerButton.disabled = false;
                registerButton.textContent = "Subscrever";
                registerButton.classList.remove('opacity-70');

                // Simulação de Sucesso no Registo
                showFeedback(`Subscrição bem-sucedida! Bem-vindo(a), ${name}.`, true);
                console.log("Registo bem-sucedido:", { name, email, password });
                
                // Limpar formulário
                form.reset();

            }, 1500); // Simula 1.5 segundos de tempo de resposta do servidor
        }

        // Garante que a mensagem de feedback não é visível ao carregar
        document.addEventListener('DOMContentLoaded', () => {
             feedbackDiv.classList.add('hidden');
        });

        // Log para fins de debug da configuração
        console.log(`App ID: ${appId}`);
    </script>
    <script src="javascr.js"></script>
</body>
</html>
